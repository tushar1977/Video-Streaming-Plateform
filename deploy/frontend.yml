services:
  frontend:
    image: frontend
    container_name: frontend
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - ./.env.development

    labels:
      - traefik.enable=true
      - traefik.http.router.frontend-http.rule=Host(`frontend.hacktheway.live`)
    networks:
      - custom_network

networks:
  custom_network:
    external: true
